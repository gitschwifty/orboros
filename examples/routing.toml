# Legacy routing.toml compatibility example.
#
# Prefer `[tool_profiles.<worker_type>]` in `.orbs/config.toml` for new
# projects. This file remains as a profiles-only fallback for older setups.

[profiles.edit]
allowed_tools = ["read", "write", "execute", "glob", "grep"]

[profiles.research]
allowed_tools = ["read", "web_search", "glob", "grep"]

[profiles.review]
allowed_tools = ["read", "glob", "grep"]

[profiles.default]
allowed_tools = ["read", "write", "execute", "glob", "grep", "web_search"]
