id = "identify-root-cause"
tier = "t1"
name = "Identifies a panic's root cause from a stack trace"
description = """
Worker is shown a short Rust panic with a stack trace and must identify
the underlying cause in one or two sentences. The expected text is
permissive (regex) — any plausible answer mentioning the unwrap or
None passes.
"""
prompt = """
The following Rust panic occurred. In one short sentence, identify the
root cause:

thread 'main' panicked at 'called `Option::unwrap()` on a `None` value', src/main.rs:7:24
note: run with `RUST_BACKTRACE=1` environment variable to display a backtrace
stack backtrace:
   0: rust_begin_unwind
   1: core::panicking::panic_fmt
   2: core::panicking::panic
   3: my_app::main
"""

[expected]
kind = "regex"
# Accept either "unwrap" or "None" anywhere in the response — both
# correctly identify the cause.
pattern = "(?i)(unwrap|none value|unwrapped a None)"
